<!DOCTYPE html>
<html lang="ko">

<head>
  {% include head.html %}

  <!-- Pretendard: 트렌디한 한국어 산세리프 웹폰트 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <style>
    /* ── 전체 폰트: Pretendard ── */
    body, h1, h2, h3, h4, h5, h6, p, a, span, li, td, th, blockquote,
    .navbar-brand, .nav-link, .list-group-item, button {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif !important;
    }

    /* ── 배경 & 기본 텍스트 ── */
    html { background-color: #F2EDE4 !important; }
    body {
      font-size: 16px;
      line-height: 1.85;
      color: #1E1A16;
      background-color: #F2EDE4 !important;
      word-break: keep-all;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    /* ── 네비바: 항상 상단 고정, 슬라이드 없음 ── */
    #mainNav {
      position: fixed !important;
      top: 0 !important;
      background-color: rgba(242, 237, 228, 0.97) !important;
      border-bottom: 1px solid #DDD5C4 !important;
      backdrop-filter: blur(8px);
    }
    #mainNav.is-fixed {
      top: 0 !important;
      transform: none !important;
      background-color: rgba(242, 237, 228, 0.97) !important;
      border-bottom: 1px solid #DDD5C4 !important;
    }
    #mainNav.is-visible {
      transform: none !important;
      box-shadow: 0 1px 12px rgba(0,0,0,0.07) !important;
    }
    #mainNav .navbar-brand,
    #mainNav .nav-link,
    #mainNav.is-fixed .navbar-brand,
    #mainNav.is-fixed .nav-link {
      color: #1E1A16 !important;
    }
    #mainNav .navbar-brand:hover,
    #mainNav .nav-link:hover {
      color: #8B6F47 !important;
    }

    /* ── 마스트헤드 ── */
    header.masthead .overlay {
      background-color: #1A0F04 !important;
      opacity: 0.62 !important;
    }
    .masthead .post-heading h1,
    .masthead .post-heading .subheading,
    .masthead .post-heading .meta,
    .masthead .page-heading h1,
    .masthead .page-heading .subheading,
    .masthead .site-heading h1,
    .masthead .site-heading .subheading {
      color: #FDF6EC !important;
      text-shadow: 0 2px 12px rgba(0,0,0,0.55);
      letter-spacing: 0.04em;
    }

    /* ── 본문 제목 ── */
    .post-content h1, .post-content h2, .post-content h3,
    .post-content h4, .content-column h1, .content-column h2 {
      color: #1A120A;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-top: 2.4rem;
      margin-bottom: 0.9rem;
    }
    .post-content, article, .content-column {
      font-size: 16.5px;
      letter-spacing: 0.01em;
    }

    /* ── 포스트 목록 ── */
    .post-preview > a > .post-title { letter-spacing: 0.02em; }
    hr.small { border-color: #C9B8A4; }

    /* ── 코드 블록 ── */
    code, pre, .highlight {
      font-family: "JetBrains Mono", "Fira Code", Consolas, monospace !important;
      font-size: 13px !important;
    }

    /* ── 텍스트 선택 ── */
    ::selection     { background: #8B6F47; color: #fff; }
    ::-moz-selection { background: #8B6F47; color: #fff; }

    /* ── 푸터 ── */
    footer {
      background-color: #E8E1D5 !important;
      border-top: 1px solid #D4C9B5 !important;
    }

    /* ── 포스트 페이지 배경 (흰 박스 없애기) ── */
    .posts-full-width { background: transparent !important; }
  </style>
</head>

<body>

  {% include navbar.html %}

  {{ content }}

  {% include footer.html %}

  {% include scripts.html %}

  {% include google-analytics.html %}

</body>

</html>
